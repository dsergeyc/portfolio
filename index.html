<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Denis Sergeychik — Design Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #000;
    --t1:     #F5F5F7;
    --t2:     rgba(245,245,247,0.52);
    --t3:     rgba(245,245,247,0.26);
    --border: rgba(255,255,255,0.07);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 44px 56px 44px;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-mark {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--t3);
  }

  a.nav-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--t2);
    text-decoration: none;
    transition: color 0.18s;
  }
  a.nav-link:hover { color: var(--t1); }

  /* ── Hero ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 0 56px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--t3);
    margin-bottom: 22px;
  }

  h1 {
    font-size: clamp(60px, 9vw, 116px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.93;
    color: var(--t1);
    margin-bottom: 48px;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    max-width: 760px;
  }

  .cell {
    background: #000;
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cell-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--t3);
  }

  .cell-value {
    font-size: 14px;
    font-weight: 400;
    color: var(--t2);
    line-height: 1.55;
  }

  .cell-value strong {
    font-weight: 600;
    color: var(--t1);
  }

  /* ── Footer ── */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }

  .footer-copy {
    font-size: 12px;
    color: var(--t3);
  }

  /* ── Animations ── */
  @keyframes up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  nav         { animation: up 0.5s ease both; }
  .eyebrow    { animation: up 0.5s 0.06s ease both; }
  h1          { animation: up 0.55s 0.1s ease both; }
  .grid       { animation: up 0.55s 0.18s ease both; }
  footer      { animation: up 0.5s 0.24s ease both; }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .page { padding: 32px 24px; }
    h1 { margin-bottom: 36px; }
    .grid { grid-template-columns: 1fr 1fr; max-width: 100%; }
  }

  @media (max-width: 440px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <nav>
    <span></span>
    <a class="nav-link" href="https://linkedin.com/in/denis-sergeychik" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
  </nav>

  <div class="hero">
    <div class="eyebrow">Product Design Manager</div>
    <h1>Denis<br>Sergeychik</h1>

    <div class="grid">
      <div class="cell">
        <div class="cell-label">Currently</div>
        <div class="cell-value"><strong>Adobe</strong><br>Acquisition &amp; Expansion</div>
      </div>
      <div class="cell">
        <div class="cell-label">Experience</div>
        <div class="cell-value"><strong>15+ years</strong><br>Adobe, AKQA, Apple</div>
      </div>
      <div class="cell">
        <div class="cell-label">Focus</div>
        <div class="cell-value"><strong>Commerce</strong><br>Platform &amp; Growth</div>
      </div>
      <div class="cell">
        <div class="cell-label">Location</div>
        <div class="cell-value"><strong>San Jose</strong><br>California, US</div>
      </div>
    </div>
  </div>

  <footer></footer>

</div>
</body>
</html>
