<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Denis Sergeychik</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #000000;
    --s1:     #1C1C1E;
    --border: rgba(255,255,255,0.08);
    --t1:     #F5F5F7;
    --t2:     rgba(245,245,247,0.6);
    --t3:     rgba(245,245,247,0.32);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 32px;
  }

  .wrap {
    max-width: 560px;
    width: 100%;
  }

  .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--t3);
    margin-bottom: 28px;
  }

  h1 {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--t1);
    margin-bottom: 20px;
  }

  .role {
    font-size: clamp(17px, 2vw, 22px);
    font-weight: 400;
    color: var(--t2);
    line-height: 1.5;
  }

  footer {
    position: fixed;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: var(--t3);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="label">Product Design</div>
  <h1>Denis<br>Sergeychik</h1>
  <p class="role">Design Manager, Acquisition &amp; Expansion at Adobe.<br>Building checkout experiences at scale.</p>
</div>

<footer>denissergeychik.com</footer>

</body>
</html>
